repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.9
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
  - repo: local
    hooks:
      - id: verify-demo-gif
        name: verify demo GIF frame layout
        entry: uv run python scripts/verify_demo_gif.py
        language: system
        pass_filenames: false
        files: ^(scripts/generate_demo_gif\.py|docs/assets/demo-v2\.gif)$
