stages:
  ingest:
    cmd: uv run python -m textSummarizer.pipeline.stage_01_data_ingestion
    outs:
      - artifacts/data_ingestion
  validate:
    cmd: uv run python -m textSummarizer.pipeline.stage_02_data_validation
    deps:
      - artifacts/data_ingestion
    outs:
      - artifacts/data_validation
  transform:
    cmd: uv run python -m textSummarizer.pipeline.stage_03_data_transformation
    deps:
      - artifacts/data_ingestion
    outs:
      - artifacts/data_transformation
  train:
    cmd: uv run python -m textSummarizer.pipeline.stage_04_model_trainer
    deps:
      - artifacts/data_transformation
    outs:
      - artifacts/model_trainer
  evaluate:
    cmd: uv run python -m textSummarizer.pipeline.stage_05_model_evaluation
    deps:
      - artifacts/model_trainer
    metrics:
      - artifacts/model_evaluation/metrics.json
